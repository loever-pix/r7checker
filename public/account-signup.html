<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R6Checker — Create account</title>
  <link rel="icon" type="image/png" href="/img/logo.png">
  <link rel="stylesheet" href="/style.css">
  <style>
    :root{
      --brand:#3a8dff; --brand-soft:#5aa3ff;
      --bg:#080b14; --bg-card:#111827;
      --border:#1e2842; --text:#e7ecf6; --text-dim:#8593ad;
    }
    body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;
         min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem;}
    body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
      background-repeat:no-repeat;background-position:center;background-size:cover;
      background-image:linear-gradient(180deg,rgba(8,11,20,.88),rgba(8,11,20,.93)),
        radial-gradient(circle at 20% 0%,rgba(58,141,255,.12),transparent 50%),
        url('/img/ayanokoji/hero-1280.webp');}
    .shell{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
           padding:1.4rem;max-width:420px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.5);}
    .home-link{display:block;text-align:center;color:var(--text-dim);text-decoration:none;font-size:.85rem;margin-bottom:.6rem;}
    .home-link:hover{color:var(--brand-soft);}
    h1{font-weight:800;font-size:1.6rem;margin:.3rem 0 .3rem;text-align:center;}
    h1 .dot{color:#cad3dc;}
    .sub{color:var(--text-dim);text-align:center;font-size:.82rem;margin:0 0 1rem;line-height:1.5;}
    .form-group{margin-bottom:.8rem;}
    label{display:block;font-size:.78rem;margin-bottom:.3rem;}
    input{width:100%;padding:.75rem .9rem;box-sizing:border-box;background:#0b1220;
          border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:.95rem;outline:none;
          transition:border-color .15s,box-shadow .15s;}
    input::placeholder{color:#4d5a72;}
    input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(58,141,255,.15);}
    .btn{width:100%;padding:.7rem;background:var(--brand);color:#fff;border:none;border-radius:6px;
         font-weight:600;font-size:.95rem;cursor:pointer;margin-top:.3rem;}
    .btn:hover{background:var(--brand-soft);}
    .btn:disabled{opacity:.55;cursor:wait;}
    .err{color:#f87171;font-size:.8rem;margin:.4rem 0 0;min-height:1em;text-align:center;}
    .alt{color:var(--text-dim);text-align:center;font-size:.82rem;margin-top:1rem;}
    .alt a{color:var(--brand-soft);text-decoration:none;}
    .alt a:hover{text-decoration:underline;}
    .cf-turnstile{margin:.5rem 0;display:flex;justify-content:center;}
    /* Phones: 16px inputs stop iOS Safari auto-zoom on focus. */
    @media (max-width:640px){ input,select{font-size:16px;} body{padding:1rem .8rem;} .shell{padding:1.15rem;} }
  </style>
</head>
<body>
  <div class="shell">
    <a class="home-link" href="/">← Back to home</a>
    <h1>Sign up<span class="dot">.</span></h1>
    <p class="sub">Email and a password — that's it. Used to hold your check-balance.</p>
    <form id="signup-form" autocomplete="on">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password (12+ chars)</label>
        <input type="password" id="password" name="password" required minlength="12" autocomplete="new-password">
      </div>
      <button type="submit" class="btn" id="submit-btn">Create account</button>
      <div class="err" id="err"></div>
    </form>
    <div class="alt" style="font-size:.75rem;margin-top:.6rem;opacity:.8;">By creating an account you agree to our <a href="/legal" target="_blank">Terms &amp; Privacy</a>.</div>
    <div class="alt">Already have an account? <a href="/account/login">Sign in</a></div>
    <div class="alt" style="margin-top:.5rem;"><a href="https://discord.gg/gnPB2JBPS6" target="_blank" rel="noopener noreferrer">Need help? Join our Discord</a></div>
  </div>
  <script>
    const form = document.getElementById('signup-form');
    const errEl = document.getElementById('err');
    const btn = document.getElementById('submit-btn');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      btn.disabled = true; btn.textContent = 'Creating…';
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const r = await fetch('/api/auth/signup', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ email, password }),
        });
        const data = await r.json();
        if (!r.ok) { errEl.textContent = data.error || 'Signup failed.'; btn.disabled=false; btn.textContent='Create account'; return; }
        // Honor a ?return_to= so we can bounce back to /marketplace/sell etc.
        const params = new URLSearchParams(location.search);
        const rt = params.get('return_to');
        location.href = (rt && /^\/[a-zA-Z0-9/_\-?=&%.+]*$/.test(rt)) ? rt : '/account';
      } catch (e) { errEl.textContent = 'Network error: ' + e.message; btn.disabled=false; btn.textContent='Create account'; }
    });
  </script>
</body>
</html>
