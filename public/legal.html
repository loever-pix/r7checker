    <!-- ───────────────────────── TERMS OF SERVICE ───────────────────────── -->
    <section id="tos-1">
      <h2>1. About the service</h2>
      <p>R6Checker ("we", "us", "the service", accessible at r6checker.xyz) lets you look up
      publicly-derived Rainbow Six Siege account information — level, inventory, ranked
      season history, linked platforms, and ban status — by signing in with Ubisoft
      credentials you provide, either one at a time or in bulk.</p>
      <p>By creating a site account, depositing funds, or running a check, you agree to these
      Terms of Service and the Privacy Policy below. If you do not agree, do not use the service.</p>
    </section>

    <section id="tos-2">
      <h2>2. Eligibility &amp; accounts</h2>
      <ul>
        <li>You must be at least 18 years old, or the age of majority in your jurisdiction, to use the service.</li>
        <li>Your R6Checker site account (email + password) is separate from any Ubisoft account. You are responsible for keeping its credentials secure.</li>
        <li>You are responsible for all activity that occurs under your site account and for the security of any Ubisoft credentials you submit for checking.</li>
      </ul>
    </section>

    <section id="tos-3">
      <h2>3. Acceptable use</h2>
      <p>You agree to use the service only with Ubisoft accounts that you own or are expressly
      authorised to access. You must <strong>not</strong>:</p>
      <ul>
        <li>Submit credentials for accounts you do not own or have no right to access;</li>
        <li>Use the service to facilitate account theft, fraud, credential-stuffing, or any unlawful activity;</li>
        <li>Resell, redistribute, or scrape the service or its outputs at scale without permission;</li>
        <li>Attempt to disrupt, overload, reverse-engineer, or circumvent the security or rate limits of the service.</li>
      </ul>
      <p>You are solely responsible for ensuring your use complies with Ubisoft's Terms of Use
      and all applicable laws.</p>
    </section>

    <section id="tos-4">
      <h2>4. Credits, payments &amp; deposits</h2>
      <ul>
        <li>The service runs on a prepaid credit balance. You add credit by depositing cryptocurrency through our payment processor (NOWPayments).</li>
        <li>Deposits are denominated in USD. The minimum deposit and the per-check price are shown on the site and may change; the price in effect at the time of a check applies.</li>
        <li>Each definitive check outcome (a successful login result, or a confirmed wrong-password result) deducts the per-check price from your balance. Non-definitive outcomes (e.g. 2FA prompts, anti-bot blocks, or network failures) are not charged.</li>
        <li>Credit has no cash value, is not interest-bearing, and is usable only within the service.</li>
        <li>Cryptocurrency transactions are irreversible. You are responsible for sending the correct amount and asset to the address provided.</li>
      </ul>
    </section>

    <section id="tos-5">
      <h2>5. Refunds</h2>
      <p>Because checks consume third-party resources (proxies, infrastructure) the moment they
      run, completed checks are non-refundable. Unused credit balance is generally
      non-refundable, except where required by law. If you believe you were charged in error
      (for example, billed on a non-definitive outcome), contact us via Discord and we will
      review and, where appropriate, credit your balance.</p>
    </section>

    <section id="tos-6">
      <h2>6. No warranty &amp; limitation of liability</h2>
      <p>The service is provided "as is" and "as available", without warranties of any kind.
      Account data is derived from Ubisoft and third-party sources that may be incomplete,
      delayed, rate-limited, or temporarily unavailable; we do not guarantee the accuracy,
      completeness, or availability of any result.</p>
      <p>To the maximum extent permitted by law, our total liability arising from your use of the
      service is limited to the amount of credit you spent in the 30 days before the event
      giving rise to the claim. We are not liable for indirect, incidental, or consequential
      damages, including loss of access to any Ubisoft account.</p>
    </section>

    <section id="tos-7">
      <h2>7. Suspension &amp; termination</h2>
      <p>We may suspend or terminate your access at any time, with or without notice, if we
      reasonably believe you have violated these terms or used the service unlawfully. On
      termination for cause, remaining credit may be forfeited.</p>
    </section>

    <section id="tos-8">
      <h2>8. Changes to these terms</h2>
      <p>We may update these terms from time to time. Material changes will be reflected by the
      "Last updated" date above. Continued use after changes take effect constitutes acceptance.</p>
    </section>

    <!-- ───────────────────────── PRIVACY POLICY ───────────────────────── -->
    <section id="pp-1">
      <h2>9. What we collect</h2>
      <ul>
        <li><strong>Site account:</strong> your email address and a securely hashed (scrypt) password. We never store your site password in plaintext.</li>
        <li><strong>Billing:</strong> deposit amounts, currency, status, and the payment-processor invoice/transaction identifiers. We do not receive or store your card details or wallet keys.</li>
        <li><strong>Usage:</strong> a transaction/audit log of credits, charges, and bulk-job metadata, plus standard server logs (IP address, timestamps) used for security and rate-limiting.</li>
      </ul>
    </section>

    <section id="pp-2">
      <h2>10. Checked-account data</h2>
      <p>To run a check you submit a Ubisoft email and password. These credentials are used
      transiently to authenticate the requested check and are <strong>not stored in our
      database</strong>. Check results — which include the submitted email and password in the
      output line so you can identify the account — are written to an encrypted results file
      (AES-256-GCM) tied to your bulk job.</p>
      <div class="note">Bulk result files are <strong>encrypted at rest and automatically deleted
      after 30 days.</strong> Re-download anytime from your account before then.</div>
    </section>

    <section id="pp-3">
      <h2>11. How we use &amp; retain data</h2>
      <ul>
        <li>To operate the service: authenticate you, process deposits, run checks, and maintain your balance.</li>
        <li>To secure the service: detect abuse, enforce rate limits, and prevent fraud.</li>
        <li><strong>Retention:</strong> bulk result files are kept for 30 days (re-downloadable from your account) then deleted. Old sessions are swept periodically. Account, balance, and transaction records are kept while your account exists and as needed for legitimate business and legal purposes.</li>
      </ul>
    </section>

    <section id="pp-4">
      <h2>12. Third parties</h2>
      <p>We share the minimum necessary data with service providers that make the product work:</p>
      <ul>
        <li><strong>NOWPayments</strong> — cryptocurrency deposit processing.</li>
        <li><strong>Cloudflare</strong> — DNS, CDN, and edge security.</li>
        <li><strong>Email provider</strong> — transactional email (e.g. password resets).</li>
        <li><strong>Ubisoft and public R6 data sources</strong> — queried to produce check results.</li>
      </ul>
      <p>We do not sell your personal data.</p>
    </section>

    <section id="pp-5">
      <h2>13. Security</h2>
      <p>We use scrypt password hashing, single-use time-limited password-reset tokens,
      HttpOnly session cookies, HMAC-verified payment webhooks, AES-256-GCM encryption of
      result files, and standard transport encryption (HTTPS). No system is perfectly secure;
      you use the service at your own risk and should use a unique password for your site account.</p>
    </section>

    <section id="pp-6">
